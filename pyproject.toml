[tool.ruff]
lint.select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "A",   # flake8-builtins
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "RET", # flake8-return
    "ARG", # flake8-unused-arguments
    "PTH", # flake8-use-pathlib
    "ERA", # flake8-eradicate
    "PL",  # Pylint
]

# Ignore some rules
lint.ignore = [
    "PLR0911", # Too many return statements
    "PLR0913", # Too many arguments
    "PLR0912", # Too many branches (parser)
    "PLR0915", # Too many statements (parser)
    "PLR2004", # Magic value comparison (в нашей ISA много магических чисел, допустимо)
    "SIM108",  # Use ternary operator (не всегда уместно)
    "RET504",  # Unnecessary variable assignment (часто удобно)
]

line-length = 160
target-version = "py312"

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.mypy]
strict = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_return_any = true
warn_unreachable = true
ignore_missing_imports = false
exclude = [
    ".venv",
    "build",
    "dist",
]

[[tool.mypy.overrides]]
module = "tools.test_golden"
disable_error_code = ["misc"]